name: Verify

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: reviewdog/action-setup@v1
        if: github.event_name == 'pull_request'
        with:
          reviewdog_version: latest

      - name: Lint and format (Biome)
        if: github.event_name != 'pull_request'
        run: pnpm exec biome check .

      - name: Lint and format (Biome reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          biome_status=0
          pnpm exec biome check --reporter=json . 2>/dev/null > biome-verify.json || biome_status=$?
          trap 'rm -f biome-verify.json' EXIT
          set +e
          set -o pipefail
          python3 scripts/ci/biome_rdjsonl_for_reviewdog.py < biome-verify.json \
          | reviewdog -f=rdjsonl \
                      -name=biome \
                      -reporter=github-pr-review \
                      -filter-mode=added
          pipe_status=("${PIPESTATUS[@]}")
          py_exit="${pipe_status[0]:-0}"
          rd_exit="${pipe_status[1]:-0}"
          set -e
          echo "biome_rdjsonl_py_exit=${py_exit} reviewdog_exit=${rd_exit} biome_check_exit=${biome_status} (step fails only on helper or reviewdog after filter)"
          if [ "$py_exit" -ne 0 ]; then
            echo "::error::scripts/ci/biome_rdjsonl_for_reviewdog.py exited with status ${py_exit}"
            exit "$py_exit"
          fi
          exit "$rd_exit"

      - name: Type check (tsc)
        if: github.event_name != 'pull_request'
        run: pnpm typecheck

      - name: Type check (tsc reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          set -o pipefail
          pnpm typecheck 2>&1 |
          reviewdog -f=tsc \
                    -name=tsc \
                    -reporter=github-pr-review \
                    -filter-mode=added
          pipe_status=("${PIPESTATUS[@]}")
          tsc_exit="${pipe_status[0]:-0}"
          rd_exit="${pipe_status[1]:-0}"
          set -e
          echo "tsc_exit=${tsc_exit} reviewdog_exit=${rd_exit}"
          if [ "$rd_exit" -ne 0 ]; then
            echo "::error::reviewdog exited with status ${rd_exit}"
            exit "$rd_exit"
          fi
          if [ "$tsc_exit" -ne 0 ]; then
            echo "::error::pnpm typecheck exited with status ${tsc_exit}"
            exit "$tsc_exit"
          fi

      - name: Unit tests (Vitest)
        if: success()
        run: pnpm test:run

      - name: Cache Next.js compiler cache
        if: success()
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        if: success()
        run: pnpm build

      - name: Run Lighthouse CI (localhost)
        if: success() && github.event_name == 'pull_request'
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000
          configPath: ./.github/lighthouse/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
          budgetPath: ./.github/lighthouse/budget.json
