name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Lint and format (Biome)
        id: biome_check
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          biome_status=0
          pnpm exec biome check --reporter=json . 2>/dev/null > biome-verify.json || biome_status=$?
          trap 'rm -f biome-verify.json' EXIT
          set +e
          set -o pipefail
          python3 scripts/ci/biome_rdjsonl_for_reviewdog.py < biome-verify.json \
          | reviewdog -f=rdjsonl \
                      -name=biome \
                      -reporter=github-pr-review \
                      -filter-mode=added
          pipe_status=("${PIPESTATUS[@]}")
          py_exit="${pipe_status[0]:-0}"
          rd_exit="${pipe_status[1]:-0}"
          set -e
          echo "biome_rdjsonl_py_exit=${py_exit} reviewdog_exit=${rd_exit} biome_check_exit=${biome_status}"
          if [ "$py_exit" -ne 0 ]; then
            echo "::error::scripts/ci/biome_rdjsonl_for_reviewdog.py exited with status ${py_exit}"
            exit "$py_exit"
          fi
          final=0
          if [ "$biome_status" -ne 0 ]; then final=1; fi
          if [ "$rd_exit" -ne 0 ]; then final=1; fi
          exit "$final"

      - name: Type check (tsc)
        id: typecheck_step
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          set -o pipefail
          pnpm typecheck 2>&1 |
          reviewdog -f=tsc \
                    -name=tsc \
                    -reporter=github-pr-review \
                    -filter-mode=added
          pipe_status=("${PIPESTATUS[@]}")
          tsc_exit="${pipe_status[0]:-0}"
          rd_exit="${pipe_status[1]:-0}"
          set -e
          echo "tsc_exit=${tsc_exit} reviewdog_exit=${rd_exit}"
          final=0
          if [ "$tsc_exit" -ne 0 ]; then final=1; fi
          if [ "$rd_exit" -ne 0 ]; then final=1; fi
          exit "$final"

      - name: Quality gate
        if: always()
        run: |
          exit_code=0
          if [ "${{ steps.biome_check.outcome }}" != "success" ]; then
            echo "::error::Biome did not pass (see step logs and reviewdog comments on the PR if applicable)"
            exit_code=1
          fi
          if [ "${{ steps.typecheck_step.outcome }}" != "success" ]; then
            echo "::error::Typecheck did not pass (see step logs and reviewdog comments on the PR if applicable)"
            exit_code=1
          fi
          exit "$exit_code"

      - name: Cache Next.js compiler cache
        if: success()
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        if: success()
        run: pnpm build
