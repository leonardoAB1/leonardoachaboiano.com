name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Lint and format (Biome)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          biome_status=0
          pnpm exec biome check --reporter=json . 2>/dev/null > biome-ci.json || biome_status=$?
          trap 'rm -f biome-ci.json' EXIT
          set +e
          set -o pipefail
          python3 scripts/ci/biome_rdjsonl_for_reviewdog.py < biome-ci.json \
          | reviewdog -f=rdjsonl \
                      -name=biome \
                      -reporter=github-pr-review \
                      -filter-mode=added
          pipe_status=("${PIPESTATUS[@]}")
          py_exit="${pipe_status[0]:-0}"
          rd_exit="${pipe_status[1]:-0}"
          set -e
          if [ "$py_exit" -ne 0 ]; then
            echo "::error::scripts/ci/biome_rdjsonl_for_reviewdog.py exited with status ${py_exit}"
            exit "$py_exit"
          fi
          if [ "$rd_exit" -ne 0 ]; then exit "$rd_exit"; fi
          exit "$biome_status"

      - name: Type check (tsc)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm typecheck 2>&1 |
          reviewdog -f=tsc \
                    -name=tsc \
                    -reporter=github-pr-review \
                    -filter-mode=added

      - name: Build
        run: pnpm build
