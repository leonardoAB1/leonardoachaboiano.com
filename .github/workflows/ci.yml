name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Lint and format (Biome)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec biome check --reporter=json . 2>/dev/null \
          | jq -c '
              .diagnostics[]
              | select(.location.path.file != null)
              | {
                  message: .description,
                  location: {
                    path: .location.path.file,
                    range: {
                      start: {
                        line: ((.location.span.start.line // 1) | if . < 1 then 1 else . end),
                        column: ((.location.span.start.column // 1) | if . < 1 then 1 else . end)
                      }
                    }
                  },
                  severity: (if .severity == "error" then "ERROR" elif .severity == "warning" then "WARNING" else "INFO" end)
                }
            ' \
          | reviewdog -f=rdjsonl \
                      -name=biome \
                      -reporter=github-pr-review \
                      -filter-mode=added

      - name: Type check (tsc)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm typecheck 2>&1 |
          reviewdog -f=tsc \
                    -name=tsc \
                    -reporter=github-pr-review \
                    -filter-mode=added

      - name: Build
        run: pnpm build
