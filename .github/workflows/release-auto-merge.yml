name: Release Auto Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'release-please--branches--main--components--leonardoachaboiano.com'
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub auto-merge
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ "$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest != null')" = "true" ]; then
            echo "Auto-merge is already enabled for $PR_URL"
            exit 0
          fi

          gh pr merge "$PR_URL" --squash --auto --delete-branch
